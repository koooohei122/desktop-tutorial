[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "growing_agent"
version = "0.1.0"
description = "A minimal self-improving agent with observe-plan-act-evaluate-update loop"
readme = "README.md"
requires-python = ">=3.8"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
growing-agent = "growing_agent.__main__:main"
