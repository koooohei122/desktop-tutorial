[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "growing_agent"
version = "0.1.0"
description = "Minimal agent with observe-plan-act-evaluate-update loop"
readme = "README.md"
requires-python = ">=3.9"
dependencies = ["pytest"]

[project.scripts]
growing-agent = "growing_agent.__main__:main"

[tool.setuptools.packages.find]
where = ["src"]
